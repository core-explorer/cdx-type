<!doctypehtml><html lang=en-us><head><meta content="text/html; charset=utf-8"http-equiv=Content-Type><meta charset=UTF-8><meta content="width=device-width,initial-scale=1"name=viewport><title>Core Explorer - Static Analyzer for Dynamic Memory</title><link href=style.css rel=stylesheet></head><body><div id=main style=display:none><div id=navigate></div><div id=output></div><h3>Upload ELF files</h3><div id=drop-area><form class=upload_form><p>Drag and drop a file here or click to select a file</p><input id=fileInput multiple type=file></form><script src=darkmode.js></script><script src=sorttable.js></script><script>const dropArea=document.getElementById("drop-area"),fileInput=document.getElementById("fileInput"),gallery=document.getElementById("gallery"),fileContent=document.getElementById("fileContent");function preventDefaults(e){e.preventDefault(),e.stopPropagation()}function handleDrop(e){handleFiles({target:{files:e.dataTransfer.files}})}function handleFiles(e){[...e.target.files].forEach((e=>{readFile(e)}))}function set_url(e){const t=lengthBytesUTF8(e)+1,r=_malloc(t);stringToUTF8(e,r,t),Module.setUrl(r,t-1),_free(r)}function readFile(e){const t=new FileReader;let r=e.name;t.onload=function(e){const t=new Uint8Array(e.target.result);console.log(t);const n=lengthBytesUTF8(r)+1,a=_malloc(n);stringToUTF8(r,a,n);const o=t.length,l=_malloc(o);writeArrayToMemory(t,l),Module.processFileContent(a,n-1,l,o),_free(a),_free(l)},t.readAsArrayBuffer(e)}["dragenter","dragover","dragleave","drop"].forEach((e=>{dropArea.addEventListener(e,preventDefaults,!1)})),["dragenter","dragover"].forEach((e=>{dropArea.addEventListener(e,(()=>dropArea.classList.add("highlight")),!1)})),["dragleave","drop"].forEach((e=>{dropArea.addEventListener(e,(()=>dropArea.classList.remove("highlight")),!1)})),dropArea.addEventListener("drop",handleDrop,!1),fileInput.addEventListener("change",handleFiles,!1)</script><script src=index.js async></script></div></div></body></html>
